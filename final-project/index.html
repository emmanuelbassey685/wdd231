<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Welcome to SkyPulse Weather. Access professional microclimate data streams and live field instrumentation monitoring across global telemetry grids.">
    <meta name="author" content="Bassey, Emmanuel">
    <meta property="og:description" content="Access professional microclimate data streams and live field instrumentation monitoring.">>
    <meta property="og:title" content="Weather Forecast | SkyPulse Weather">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://emmanuelbassey685.github.io/wdd231/final-project/images/favicon.ico">
    <meta property="og:url" content="https://emmanuelbassey685.github.io/wdd231/final-project/">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css" media="(min-width: 768px)">
    <script src="scripts/main.js" type="module"></script>
    <script src="scripts/modal.js" defer></script>
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/weather.js" defer></script>
    <script src="scripts/storage.js" defer></script>
    <title>SkyPulse Weather | Home</title>
</head>
<body>
    <header>
        <div class="logo-area">
            <img src="images/logo.webp" alt="SkyWatch Logo" width="50" height="50">
            <h1>SkyWatch</h1>
        </div>
        <button id="menu-toggle" aria-label="Toggle Navigation">☰</button>
        <nav id="main-nav">
            <a href="index.html" class="active">Home</a>
            <a href="forecast.html">Forecast</a>
            <a href="alerts.html">Alerts</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <img src="images/weather-icon.png" alt="Beautiful Sky Summary View">
            <div class="hero-text">
                <h2>Real-Time Weather Tracking</h2>
                <p>Stay ahead of the storm with local updates.</p>
            </div>
        </section>

        <section class="weather-dashboard">
            <div class="search-box">
                <select id="city-selector">
                    <option value="">Select a City...</option>
                </select>
            </div>
            
            <div id="current-weather" class="card">
                <h3>Current Weather</h3>
                <p class="placeholder">Select a city above to load data.</p>
            </div>
        </section>

        <section class="subscription-box card">
            <h3>Get Daily Alerts</h3>
            <form action="subscribe-result.html" method="GET">
                <input type="text" name="first_name" placeholder="Enter your first name" required>
                <input type="text" name="last_name" placeholder="Enter your last name" required>
                <input type="email" name="email" placeholder="Enter your email" required>
                <button type="submit">Subscribe</button>
            </form>
        </section>
    </main>


    <footer>
        <p>&copy; <span id="year"></span> Bassey, Emmanuel / SkyPulse Weather Project. All rights reserved.</p>
        <p>Last Modified: <span id="last-modified"></span></p>
    </footer>

</body>
</html>
