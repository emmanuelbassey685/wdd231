<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time weather forecasts, real-time weather updates and meteorological information for your city.">
    <meta name="author" content="Emmanuel Bassey">
    <meta property="og:title" content="SkyPulse | Localized Weather & Live Forecasts">
    <meta property="og:description" content="Get real-time weather updates, accurate 7-day forecasts, and local climate alerts.">
    <meta property="og:image" content="https://emmanuelbassey685.github.io/wdd231/Final-Project/images/favicon-32x32.png">
    <meta property="og:url" content="https://emmanuelbassey685.github.io/wdd231/Final-Project/">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Pacifico&display=swap" rel="stylesheet">
    <script src="../scripts/date.js" defer></script>    
    <script src="scripts/storage.js" defer></script>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css" media="(min-width: 768px)">
    <title>SkyPulse | Subscription Message</title>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo-area">
                <img src="images/favicon-32x32.png" alt="SkyPulse Logo" class="logo" width="32" height="32">
                <p>SkyPulse</p>
            </div>
        </div>
    </header>

    <main class="container success-page">
        <div class="card text-center">
            <h1>🎉 Thank You for Subscribing!</h1>
            <p>Welcome to our network, <strong id="user-name">Guest</strong>!</p>
            <p>A confirmation email has been sent to: <span id="user-email" class="highlight"></span></p>
            <p>You will now receive emergency notifications and automated daily reports.</p>
            <a href="index.html" class="btn inline-block">Return Home</a>
        </div>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> Bassey, Emmanuel.</p>
        <p>Last Modified: <span id="last-modified"></span></p>
    </footer>

    <script>
        // Directly pull URL parameters on response page
        const params = new URLSearchParams(window.location.search);
        document.getElementById('user-name').textContent = params.get('name') || 'Subscriber';
        document.getElementById('user-email').textContent = params.get('email') || 'your email';
        document.getElementById('year').textContent = new Date().getFullYear();
        document.getElementById('last-modified').textContent = new Date().toLocaleDateString();
    </script>
</body>
</html>
